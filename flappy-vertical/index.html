    <main class="flex-grow">
        <header class="flappy-header">
            <h1 data-i18n="game_flappy_title" class="font-display">Flappy Vertical</h1>
            <p class="subtitle" data-i18n="subtitle"></p>
        </header>

        <div class="main-content">
            <div class="download-buttons">
                <a href="https://play.google.com/store/apps/details?id=com.acgames365.flappyvertical" target="_blank" class="transition transform hover:scale-105">
                    <img src="/assets/images/google-play-badge.png" alt="Get it on Google Play" class="h-16">
                </a>
                <div class="relative transition transform hover:scale-105 opacity-60 cursor-not-allowed">
                    <img src="/assets/images/app-store-badge.png" alt="Download on the App Store" class="h-16">
                    <span class="absolute inset-0 flex items-center justify-center text-white font-bold text-xs" data-i18n="download_apple"></span>
                </div>
            </div>

            <div class="features grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
                <div class="feature-card" data-animate>
                    <div class="feature-icon">🎮</div>
                    <h3 class="text-xl font-display font-bold mb-2" data-i18n="f1_title"></h3>
                    <p class="text-gray-600 dark:text-gray-400" data-i18n="f1_desc"></p>
                </div>
                <div class="feature-card" data-animate>
                    <div class="feature-icon">🎨</div>
                    <h3 class="text-xl font-display font-bold mb-2" data-i18n="f2_title"></h3>

                </div>
                <div class="feature-card sm:col-span-2 lg:col-span-1" data-animate>

                    <p class="text-gray-600 dark:text-gray-400" data-i18n="f3_desc"></p>
                </div>
            </div>
