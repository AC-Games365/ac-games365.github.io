<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Games - Contact</title>
    <link rel="icon" type="image/png" href="/assets/images/icon/icon.png">
    <meta name="description" content="Contact AC Games for support or inquiries.">
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 font-sans antialiased flex flex-col min-h-screen transition-colors duration-300">

    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto flex justify-between items-center p-4">
            <a href="/" class="text-2xl font-bold text-green-600 dark:text-green-400">AC Games</a>

            <div class="flex items-center space-x-6">
                <div class="hidden md:flex space-x-6 font-medium">
                    <a href="/" class="hover:text-green-600 dark:hover:text-green-400 transition" data-i18n="nav_home">Home</a>
                    <a href="/#games" class="hover:text-green-600 dark:hover:text-green-400 transition" data-i18n="nav_games">Games</a>
                    <a href="/contact/" class="hover:text-green-600 dark:hover:text-green-400 transition font-bold" data-i18n="nav_contact">Contact</a>
                </div>

                <!-- Controls -->
                <div class="flex items-center space-x-3">
                    <select id="lang-selector" class="bg-gray-200 dark:bg-gray-700 border-none rounded-md py-1 px-2 text-sm focus:ring-2 focus:ring-green-500 cursor-pointer">
                        <option value="en">🇺🇸 EN</option>
                        <option value="fr">🇫🇷 FR</option>
                        <option value="nl">🇳🇱 NL</option>
                    </select>
                    <button id="theme-toggler" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition focus:outline-none" aria-label="Toggle Dark Mode">
                        <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h1a1 1 0 100 2h-1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
                        <svg class="w-5 h-5 block dark:hidden text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <main class="flex-grow">
        <section id="contact" class="py-16 px-4">
            <div class="container mx-auto max-w-lg">
                <h2 class="text-3xl font-bold mb-8 text-center text-green-600 dark:text-green-400" data-i18n="contact_title">Get in Touch</h2>
                <form id="contact-form" class="space-y-6 bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1" data-i18n="contact_name">Name</label>
                        <input type="text" id="name" name="name" class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="contact_email">Email</span> <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="email" name="email" required class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="contact_message">Message</span> <span class="text-red-500">*</span>
                        </label>
                        <textarea id="message" name="message" rows="4" required class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 transition"></textarea>
                    </div>
                    <div>
                        <label for="captcha-answer" id="captcha-label" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="captcha_label">Security Question: What is 3 + 4?</span> <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="captcha-answer" name="captcha" required class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition" data-i18n="contact_send">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-100 dark:bg-gray-800 text-center py-8 border-t border-gray-200 dark:border-gray-700 text-gray-500 text-sm transition-colors duration-300">
        <p data-i18n="copyright">&copy; 2026 AC Games. All rights reserved.</p>
        <div class="mt-4 space-x-4">
            <a href="/privacy/" class="hover:text-green-600 dark:hover:text-green-400 transition" data-i18n="privacy">Privacy Policy</a>
            <span>|</span>
            <a href="/contact/" class="hover:text-green-600 dark:hover:text-green-400 transition" data-i18n="contact">Contact Support</a>
            <span>|</span>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdZzHMHshPBBY7BNYXii3B9XnnJP37MFufVLUTgq1Bfntp4zA/viewform?usp=preview" target="_blank" class="hover:text-green-600 dark:hover:text-green-400 transition" data-i18n="delete_account">Account Deletion Request</a>
        </div>
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
