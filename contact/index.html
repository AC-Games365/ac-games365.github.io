    <!-- Contact Section -->
    <main class="flex-grow">
        <section id="contact" class="py-16 px-4" data-animate>
            <div class="container mx-auto max-w-lg">
                <h2 class="text-3xl font-display font-bold mb-8 text-center text-primary-500" data-i18n="contact_title">Get in Touch</h2>
                <form id="contact-form" class="space-y-6 bg-white dark:bg-dark-800 p-8 rounded-xl shadow-lg border border-gray-200 dark:border-dark-700">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-1" data-i18n="contact_name">Name</label>
                        <input type="text" id="name" name="name" class="w-full bg-gray-100 dark:bg-dark-900 border border-gray-300 dark:border-dark-700 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="contact_email">Email</span> <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="email" name="email" required class="w-full bg-gray-100 dark:bg-dark-900 border border-gray-300 dark:border-dark-700 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="contact_message">Message</span> <span class="text-red-500">*</span>
                        </label>
                        <textarea id="message" name="message" rows="4" required class="w-full bg-gray-100 dark:bg-dark-900 border border-gray-300 dark:border-dark-700 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500 transition"></textarea>
                    </div>
                    <div>
                        <label for="captcha-answer" id="captcha-label" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-1">
                            <span data-i18n="captcha_label">Security Question: What is 3 + 4?</span> <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="captcha-answer" name="captcha" required class="w-full bg-gray-100 dark:bg-dark-900 border border-gray-300 dark:border-dark-700 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary-500 transition">
                    </div>
                    <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg hover:-translate-y-1" data-i18n="contact_send">Send Message</button>
                </form>
            </div>
        </section>
    </main>
